[pytest]
# Run only the hardware-free unit tests by default.
# Hardware/network diagnostics (diag_phase*.py, test_raw_socket*.py, etc.)
# live in tests/ but outside tests/unit/ — excluded by testpaths below.
# Run them manually against a live Seestar or network connection.
testpaths = tests/unit

# Don't recurse into these directories even if explicitly named.
norecursedirs = archive .venv .git __pycache__ node_modules

# Shorter tracebacks by default; callers can override with -v.
addopts = --tb=short -q
